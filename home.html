<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- tailwind + daisy UI  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet  -->
    <link rel="stylesheet" href="style.css">

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-[#F8FAFC] font min-h-screen">

    <!-- navbar -->
    <div class="navbar bg-base-100 shadow-sm px-20">
        <div class="flex flex-1">
            <div class="w-9 h-9">
                <img src="assets/github-logo.png" alt="">
            </div>
            <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>

        <div class="relative w-48">
            <!-- Input -->
            <input type="text" placeholder="Search issues"
                class="border border-gray-300 rounded pl-8 pr-2 py-1 w-full focus:outline-none focus:ring-2 focus:ring-blue-400" />

            <!-- Font Awesome magnifying glass -->
            <i class="fas fa-magnifying-glass absolute left-2 top-1/2 -translate-y-1/2 text-gray-400"></i>
        </div>
        <button class="btn btn-primary ml-4"><i class="fa-solid fa-plus"></i>New Issue</button>
    </div>

    <!-- button bar  -->
    <section class="">
        <div class="bg-white w-10/12 mx-auto mt-12 p-6 flex items-center rounded-xl space-x-3">
            <button class="btn btn-primary w-[8vw]">All</button>
            <button class="btn btn-primary w-[8vw]">Open</button>
            <button class="btn btn-primary w-[8vw]">Closed</button>
        </div>
    </section>

    <!-- stat bar -->
    <section class="">
        <div class="bg-white w-10/12 mx-auto mt-5 p-6 flex justify-between items-center rounded-xl space-x-3">
            <!-- left side  -->
            <div class="flex gap-2 items-center">
                <!-- img  -->
                <div class="h-10 w-10 bg-violet-100 rounded-full flex justify-center items-center">
                    <img src="assets/Aperture.png" alt="">
                </div>
                <!-- total  -->
                <div>
                    <h3 class="font-bold">50 Issues</h3>
                    <p class="font-extralight text-sm text-[#64748B]">Track and manage your project issues</p>
                </div>

            </div>

            <!-- right side  -->
            <div class="flex justify-center items-center gap-10">
                <div class="flex gap-1 justify-center items-center">
                    <i class="fa-solid fa-circle text-green-500"></i>
                    <p>Open</p>
                </div>

                <div class="flex gap-1 justify-center items-center">
                    <i class="fa-solid fa-circle text-violet-500"></i>
                    <p>Closed</p>
                </div>
            </div>
        </div>

    </section>

    <!-- card section  -->
     <section class="">
        <div class="bg-[#FBFBFB] w-10/12 mx-auto p-6 flex items-center rounded-xl space-x-3">
            
        </div>
    </section>


    <script src="login.js"></script>
    <script src="script.js"></script>
</body>

</html>
