<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- tailwind + daisy UI  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet  -->
    <link rel="stylesheet" href="style.css">

    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="bg-[#F8FAFC] font min-h-screen pb-10">

    <!-- navbar -->
    <div class="navbar bg-base-100 shadow-sm px-4 md:px-20 flex-wrap gap-3">
        <div class="flex flex-1">
            <div class="w-9 h-9">
                <img src="assets/github-logo.png" alt="">
            </div>
            <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>

        <div class="relative w-full md:w-48">
            <!-- Input -->
            <input type="text" placeholder="Search issues"
                class="border border-gray-300 rounded pl-8 pr-2 py-1 w-full focus:outline-none focus:ring-2 focus:ring-blue-400" />

            <!-- Font Awesome magnifying glass -->
            <i class="fas fa-magnifying-glass absolute left-2 top-1/2 -translate-y-1/2 text-gray-400"></i>
        </div>
        <button class="btn btn-primary md:ml-4 w-full md:w-auto"><i class="fa-solid fa-plus"></i>New Issue</button>
    </div>

    <!-- button bar  -->
    <section class="">
        <div
            class="bg-white w-11/12 md:w-10/12 mx-auto mt-6 md:mt-12 p-4 md:p-6 flex flex-wrap items-center gap-3 rounded-xl">
            <button id="tab-all" onclick="switchTab('all')" class="btn w-full sm:w-40">All</button>
            <button id="tab-open" onclick="switchTab('open')" class="btn w-full sm:w-40">Open</button>
            <button id="tab-closed" onclick="switchTab('closed')" class="btn w-full sm:w-40">Closed</button>
        </div>
    </section>

    <!-- stat bar -->
    <section class="">
        <div
            class="bg-white w-11/12 md:w-10/12 mx-auto mt-5 p-4 md:p-6 flex flex-col md:flex-row gap-4 md:justify-between md:items-center rounded-xl">
            <!-- left side  -->
            <div class="flex gap-2 items-center">
                <!-- img  -->
                <div class="h-10 w-10 bg-violet-100 rounded-full flex justify-center items-center">
                    <img src="assets/Aperture.png" alt="">
                </div>
                <!-- total  -->
                <div>
                    <h3 id="issueCount" class="font-bold">0 Issues</h3>
                    <p class="font-extralight text-sm text-[#64748B]">Track and manage your project issues</p>
                </div>

            </div>

            <!-- right side  -->
            <div class="flex justify-center items-center gap-10">
                <div class="flex gap-1 justify-center items-center">
                    <i class="fa-solid fa-circle text-green-500"></i>
                    <p>Open</p>
                </div>

                <div class="flex gap-1 justify-center items-center">
                    <i class="fa-solid fa-circle text-violet-500"></i>
                    <p>Closed</p>
                </div>
            </div>
        </div>

    </section>

    <!-- issue section  -->
    <section class="mt-0.5">
        <div class="bg-[#FBFBFB] w-11/12 md:w-10/12 mx-auto p-4 md:p-6 flex items-center rounded-xl">
            <div id="issuesContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3">
                <!-- issues will be rendered  -->
                <!-- dynamically added here  -->
                <!-- card -->

            </div>

            <!-- loading spinner  -->
            <div id="loadingSpinner" class="h-[60vh] w-full flex hidden justify-center items-center">
                <span class="loading loading-dots loading-xl"></span>
            </div>


        </div>

        <!-- issue details modal  -->
        <dialog id="issue_detail_modal" class="modal">
            <div class="modal-box">

                <h3 id="modalTitle" class="text-lg font-bold"></h3>

                <div class="flex items-center gap-2 mt-2">
                    <div id="modalStatus" class="badge"></div>

                    <span class="h-1.5 w-1.5 bg-gray-500 rounded-full"></span>

                    <p id="modalAuthor"></p>

                    <span class="h-1.5 w-1.5 bg-gray-500 rounded-full"></span>

                    <p id="modalDate"></p>
                </div>

                <!-- labels -->
                <div id="modalLabels" class="flex flex-wrap gap-2 mt-3"></div>

                <!-- description -->
                <p id="modalDescription" class="py-4"></p>

                <!-- assignee + priority -->
                <div class="bg-[#FBFBFB] flex justify-baseline space-x-16 p-6 rounded-xl">
                    <div>
                        <p>Assignee:</p>
                        <h4 id="modalAssignee" class="font-bold"></h4>
                    </div>

                    <div>
                        <p>Priority:</p>
                        <div id="modalPriority" class="badge"></div>
                    </div>
                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn btn-primary outline-none">Close</button>
                    </form>
                </div>

            </div>
        </dialog>


    </section>

    <!-- js  -->
    <!-- <script src="login.js"></script> -->
    <script src="script.js"></script>
</body>

</html>
